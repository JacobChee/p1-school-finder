name: Update School Data

on:
  schedule:
    - cron: '0 0 1 9 *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scrape.py

      - name: Check if schools.json changed
        id: check_changes
        run: |
          git diff --quiet src/schools.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated schools.json
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/schools.json
          git commit -m "Auto-update: school data $(date +'%Y-%m-%d')"
          git push
